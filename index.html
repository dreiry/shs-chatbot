<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSU-LSHS Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: auto; padding: 20px; }
        #chat-box { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user-msg { background-color: #e3f2fd; text-align: right; }
        .bot-msg { background-color: #f1f1f1; text-align: left; }
        input { width: 75%; padding: 10px; }
        button { width: 20%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>RSU-LSHS Assistant</h2>
    <div id="chat-box"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="user-input" placeholder="Ask a question...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
